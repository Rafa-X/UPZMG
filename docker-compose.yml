services:
  db:
    image: postgres:16
    container_name: upzmg_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - upzmg_db:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: upzmg_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - upzmg_pgadmin:/var/lib/pgadmin

volumes:
  upzmg_db:
  upzmg_pgadmin:
